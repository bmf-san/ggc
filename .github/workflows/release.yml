name: GoReleaser

on:
  push:
    tags:
      - '*'
  # Manual / programmatic escape hatch. The normal path is `push: tags`,
  # which fires automatically because release-please now publishes its
  # release tag with a GitHub App installation token (the default
  # `GITHUB_TOKEN` would have been blocked from starting downstream
  # workflows). `workflow_call` stays available so the release can be
  # rebuilt for an existing tag without re-tagging.
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag (e.g. v8.5.0) to build and release. Required when invoked via workflow_call.'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag (e.g. v8.5.0) to build and release.'
        required: true
        type: string

# Default the workflow token to no permissions and grant exactly what
# GoReleaser needs at the job level. Satisfies the Scorecard
# Token-Permissions check.
permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for cosign keyless signing via GitHub's OIDC provider.
      id-token: write
      # Required to push container images to ghcr.io.
      packages: write
    strategy:
      matrix:
        go-version: [ '1.25.0' ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0
          # When invoked from another workflow (release-please) or manually
          # via workflow_dispatch, ensure we check out the release tag so
          # GoReleaser sees the correct version. For tag pushes, GITHUB_REF
          # already points at the tag and the input is empty.
          ref: ${{ inputs.tag_name || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
