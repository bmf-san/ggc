name: Fuzz

on:
  pull_request:
    branches: [main]
    paths:
      - 'cmd/shlex*.go'
      - 'internal/config/alias_parse*.go'
      - '.github/workflows/fuzz.yml'
  schedule:
    - cron: '37 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: FuzzTokenize,              path: ./cmd,              fuzz: FuzzTokenize }
          - { name: FuzzValidatePlaceholder,   path: ./internal/config,  fuzz: FuzzValidatePlaceholder }
          - { name: FuzzAnalyzePlaceholders,   path: ./internal/config,  fuzz: FuzzAnalyzePlaceholders }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: '1.25.0'
      - name: Restore fuzz corpus cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.0
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-corpus-${{ matrix.target.fuzz }}-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target.fuzz }}-${{ runner.os }}-
            fuzz-corpus-${{ matrix.target.fuzz }}-
      - name: Pick fuzztime
        id: t
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "fuzztime=60s" >> "$GITHUB_OUTPUT"
          else
            echo "fuzztime=300s" >> "$GITHUB_OUTPUT"
          fi
      - name: Run ${{ matrix.target.fuzz }}
        run: |
          go test ${{ matrix.target.path }} \
            -run='^$' \
            -fuzz='^${{ matrix.target.fuzz }}$' \
            -fuzztime=${{ steps.t.outputs.fuzztime }}
      - name: Upload fuzz failure corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-failure-${{ matrix.target.fuzz }}
          path: |
            **/testdata/fuzz/**
          if-no-files-found: ignore
          retention-days: 14
