name: Fuzz

on:
  pull_request:
    branches: [main]
    paths:
      - 'cmd/shlex*.go'
      - 'internal/config/alias_parse*.go'
      - '.github/workflows/fuzz.yml'
  schedule:
    - cron: '37 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: FuzzTokenize,              path: ./cmd,              fuzz: FuzzTokenize }
          - { name: FuzzValidatePlaceholder,   path: ./internal/config,  fuzz: FuzzValidatePlaceholder }
          - { name: FuzzAnalyzePlaceholders,   path: ./internal/config,  fuzz: FuzzAnalyzePlaceholders }
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
      - name: Run ${{ matrix.target.fuzz }}
        run: |
          go test ${{ matrix.target.path }} \
            -run='^$' \
            -fuzz='^${{ matrix.target.fuzz }}$' \
            -fuzztime=60s
