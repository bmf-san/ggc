name: Dry run GoReleaser

on: [push]

# Dry-run only: GoReleaser is invoked with `--snapshot --skip=sign,docker`
# so it never pushes a tag, signs anything, or publishes images. Read-only
# token is sufficient. Satisfies the Scorecard Token-Permissions check.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25.0' ]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Dry run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: latest
          # Skip signing and docker in the dry run: cosign keyless needs a
          # real GitHub OIDC token (only minted on tagged releases), and
          # docker images can't be published from a fork anyway. The real
          # release workflow exercises both.
          args: release --snapshot --skip=sign,docker