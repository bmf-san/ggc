name: CI

on:
  push:

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.25.0']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies and tools
        run: make deps

      - name: Run tests
        run: make test

      - name: Install bats (integration test runner)
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi

      - name: Run integration tests
        run: make test-integration

      - name: Run linter
        run: make lint

      - name: Check generated artifacts are up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          make completions docs
          if ! git diff --quiet; then
            echo "::error::Generated files (completions/docs) are out of date. Run 'make docs' locally and commit the diff." >&2
            git --no-pager diff
            exit 1
          fi

      - name: Test with coverage
        run: make cover

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          fail_ci_if_error: true
          file: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          threshold=80.0
          awk "BEGIN {exit !(total < threshold)}" && \
            echo "Coverage $total% is below threshold $threshold%" && exit 1 || \
            echo "Coverage $total% is above threshold $threshold%"

      - name: Build
        run: make build
