# GoReleaser configuration
# https://goreleaser.com/customization/
version: 2

project_name: ggc

before:
  hooks:
    - go mod tidy

builds:
  - id: ggc
    main: ./main.go
    binary: ggc
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

archives:
  - id: ggc
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*feat(\([[:word:]]+\))?!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*fix(\([[:word:]]+\))?!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*perf(\([[:word:]]+\))?!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs(\([[:word:]]+\))?:'
      - '^test(\([[:word:]]+\))?:'
      - '^chore(\([[:word:]]+\))?:'
      - '^ci(\([[:word:]]+\))?:'
      - '^style(\([[:word:]]+\))?:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: bmf-san
    name: ggc
  draft: false
  prerelease: auto
